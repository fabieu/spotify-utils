[tool.poetry]
name = "spotify-utils"
version = "0.1.1"
description = "spotify-utils is yet another spotify client, but for specific utility tasks"
license = "MIT"
authors = ["Fabian Eulitz <dev@sustineo.de>"]
documentation = ""
repository = ""
keywords = ["spotify", "utils"]
readme = "README.md"

[tool.poetry.scripts]
spotify-utils = "spotify_utils.main:app"

[tool.poetry.dependencies]
python = "^3.10"
spotipy = "^2.19.0"
typer = "^0.4.0"
dynaconf = "^3.1.7"

[tool.poetry.dev-dependencies]
autopep8 = "^1.6.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
